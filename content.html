<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merged GIF & Animation</title>
    <style>
        /* Global Reset */
        body, ol, ul, h1, h2, h3, h4, h5, h6, p, th, td, dl, dd, form, fieldset, legend, input, textarea, i, select {
            margin: 0;
            padding: 0;
        }

        /* Page Layout */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 50vh;
            background-color: #2C3138;
        }

        /* GIF Styling */
        .gif-container {
            text-align: center;
            margin-bottom: 500px;
        }

        .gif-container img {
            width: 450px;
            height: auto;
            border-radius: 30px;
        }

        /* Button Styling */
        button {
            cursor: pointer;
            outline: 0;
            width: 480px;
            height: 150px;
            border-radius: 8px;
            background-color: #2C3138;
            margin-top: 20px;
            color: white;
            font-size: 50px;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: #008BFF;
            transform: scale(1.1);
        }

        /* Animated Card Container */
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 100px;
            width: 80vw;
        }

        .box {
            font-size: 100px;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s ease-out;
        }

        .box:hover {
            transform: translateY(-10px) scale(1.05);
        }

        .cover img {
            width: 500px;
            transition: all 0.3s ease-in-out;
        }

        .box .cover::after {
            content: "";
            position: absolute;
            width: 160px;
            height: 214px;
            opacity: 0;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            filter: blur(12px);
            transition: all 0.3s ease-in-out;
            transform: scale(0.8);
        }

        .box:hover .cover::after {
            opacity: 1;
            transform: scale(1);
        }

        /* Button Text Effects */
        .box button div::before {
            font-size: 20px;
            font-weight: 400;
            position: relative;
            top: -5px;
        }

        .box-1 button div::before { content: "ANN"; font-size: 70px; font-weight: bold; color: #00BF9C; }
        .box-2 button div::before { content: "JAVA"; font-size: 70px; font-weight: bold; color: rgb(154, 123, 255); }
        .box-3 button div::before { content: "PYTHON"; font-size: 70px; font-weight: bold;  color: #008BFF; }
        .box-4 button div::before { content: "AI"; font-size: 70px; font-weight: bold;  color: #FF6500; }
        .box-5 button div::before { content: "WT"; font-size: 70px; font-weight: bold;  color: #00BF9C; }
        .box-6 button div::before { content: "AI-ML"; font-size: 70px; font-weight: bold; color: rgb(154, 123, 255); }
        .box-7 button div::before { content: "STATISTICS"; font-size: 70px; font-weight: bold;  color: #008BFF; }

        .box-1:hover button div::before,
        .box-2:hover button div::before,
        .box-3:hover button div::before,
        .box-4:hover button div::before,
        .box-5:hover button div::before,
        .box-6:hover button div::before,
        .box-7:hover button div::before {
            color: #fff;
        }

        /* Footer Link */
        .dr {
            position: absolute;
            bottom: 16px;
            right: 16px;
            width: 100px;
        }
    </style>
</head>
<body>


    <!-- Animated Buttons Section -->
    <div class="container">
        <div class="box box-1">
            <div class="cover"><img src="https://s3-us-west-2.amazonaws.com/s.cdpn.io/945546/3433202-893bc9989a52eba0.png" alt=""></div>
            <button><div></div></button>
        </div>
        <div class="box box-2">
            <div class="cover"><img src="https://s3-us-west-2.amazonaws.com/s.cdpn.io/945546/3433202-964edcf0f07211b0.png" alt=""></div>
            <button><div></div></button>
        </div>
        <div class="box box-3">
            <div class="cover"><img src="https://s3-us-west-2.amazonaws.com/s.cdpn.io/945546/3433202-2ebb2b6f93add843.png" alt=""></div>
            <button><div></div></button>
        </div>
        <div class="box box-4">
            <div class="cover"><img src="https://s3-us-west-2.amazonaws.com/s.cdpn.io/945546/3433202-f79c4cc8de2f84ae.png" alt=""></div>
            <button><div></div></button>
        </div>
        <div class="box box-5">
            <div class="cover"><img src="https://s3-us-west-2.amazonaws.com/s.cdpn.io/945546/3433202-964edcf0f07211b0.png" alt=""></div>
            <button><div></div></button>
        </div>
        <div class="box box-6">
            <div class="cover"><img src="https://s3-us-west-2.amazonaws.com/s.cdpn.io/945546/3433202-2ebb2b6f93add843.png" alt=""></div>
            <button><div></div></button>
        </div>
        <div class="box box-7">
            <div class="cover"><img src="https://s3-us-west-2.amazonaws.com/s.cdpn.io/945546/3433202-f79c4cc8de2f84ae.png" alt=""></div>
            <button><div></div></button>
        </div>
    </div>

    <!-- Footer Logo -->
    <a href="https://dribbble.com/YancyMin" class="dr-url" target="_blank">
        <img class="dr" src="https://cdn.dribbble.com/assets/logo-footer-hd-a05db77841b4b27c0bf23ec1378e97c988190dfe7d26e32e1faea7269f9e001b.png" alt="Dribbble Logo">

</body>
</html>
